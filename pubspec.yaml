name: bottle_sort_puzzle
description: Bottle Sort – Water Color Puzzle Game. Offline, optimized, clean architecture.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage (no codegen needed)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigation
  go_router: ^14.2.7

  # Utilities
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
